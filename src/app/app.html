<div class="min-h-screen bg-black text-surface-0 font-sans flex flex-col">
  <nav class="bg-black border-b border-surface-800 sticky top-0 z-50">
    <div class="max-w-24xl mx-auto px-4 h-16 flex items-center">
      <div class="flex items-center gap-3">
        <!-- Mobile toggle -->
        <p-button class="md:hidden" icon="pi pi-bars" (click)="drawerVisible.set(true)" variant="text" severity="secondary" rounded />
        <!-- Desktop toggle -->
        <p-button class="hidden md:flex" icon="pi pi-bars" (click)="siderVisible.set(!siderVisible())" variant="text" severity="secondary" rounded />
        <div class="flex items-center gap-2">
          <span class="font-bold text-xl tracking-tight">Copa do Mundo 2026</span>
        </div>
      </div>
    </div>
  </nav>

  <ng-template #menuItems>
    <div class="flex flex-col gap-2">
      <a routerLink="/schedule" routerLinkActive="!bg-surface-800 !text-primary-400 font-bold" #rlaSchedule="routerLinkActive" (click)="drawerVisible.set(false)" class="px-4 py-3 rounded-md text-surface-200 hover:bg-surface-800 transition-colors flex items-center gap-3">
        <i class="pi pi-calendar" [style.-webkit-text-stroke]="rlaSchedule.isActive ? '1px currentColor' : '0'"></i>
        Jogos
      </a>
      <a routerLink="/groups" routerLinkActive="!bg-surface-800 !text-primary-400 font-bold" #rlaGroups="routerLinkActive" (click)="drawerVisible.set(false)" class="px-4 py-3 rounded-md text-surface-200 hover:bg-surface-800 transition-colors flex items-center gap-3">
        <i class="pi pi-table" [style.-webkit-text-stroke]="rlaGroups.isActive ? '1px currentColor' : '0'"></i>
        Grupos
      </a>
      <a routerLink="/top-scorers" routerLinkActive="!bg-surface-800 !text-primary-400 font-bold" #rlaScorers="routerLinkActive" (click)="drawerVisible.set(false)" class="px-4 py-3 rounded-md text-surface-200 hover:bg-surface-800 transition-colors flex items-center gap-3">
        <i [class]="rlaScorers.isActive ? 'pi pi-star-fill' : 'pi pi-star'"></i>
        Artilheiros
      </a>
      <a routerLink="/classification" routerLinkActive="!bg-surface-800 !text-primary-400 font-bold" #rlaClassification="routerLinkActive" (click)="drawerVisible.set(false)" class="px-4 py-3 rounded-md text-surface-200 hover:bg-surface-800 transition-colors flex items-center gap-3">
        <i [class]="rlaClassification.isActive ? 'pi pi-list' : 'pi pi-list'"></i>
        Classificação
      </a>
    </div>
  </ng-template>

  <div class="flex flex-1 relative">
    <!-- Desktop Sider -->
    @if (siderVisible()) {
      <aside class="hidden md:block w-56 bg-black border-r border-white/20 sticky top-16 h-[calc(100vh-4rem)] overflow-y-auto shrink-0">
        <div class="p-4">
          <ng-container *ngTemplateOutlet="menuItems"></ng-container>
        </div>
      </aside>
    }

    <!-- Mobile Drawer -->
    <p-drawer [visible]="drawerVisible()" (visibleChange)="drawerVisible.set($event)" header="Menu" styleClass="md:hidden">
      <div class="bg-surface-900 border-t border-surface-800 p-2">
        <ng-container *ngTemplateOutlet="menuItems"></ng-container>
      </div>
    </p-drawer>

    <!-- Main Content -->
    <div class="flex flex-col flex-1 min-w-0">
      <main class="flex-1">
        <router-outlet></router-outlet>
      </main>

      <footer class="bg-surface-900 border-t border-surface-800 py-4 text-center text-surface-400 text-sm mt-auto">
        <p>© Desenvolvido pelo <b>Napolis.</b></p>
      </footer>
    </div>
  </div>
</div>
