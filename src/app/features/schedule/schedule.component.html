<div class="flex flex-col gap-6 py-8 px-4 max-w-7xl mx-auto">
  <div class="flex flex-col items-center gap-4" routerLink="/">
    <div class="flex flex-col gap-4 items-center cursor-pointer">
      <img src="world-cup-white.png" alt="Copa 2026 Logo" class="w-40 md:w-60"/>
      <h1 class="text-3xl font-bold m-0 text-center">Jogos</h1>
    </div>
    <div class="flex flex-wrap justify-center items-center gap-4 w-full mt-2">

      <!-- Day Navigator -->
      <div
        class="flex items-center gap-2 md:w-auto justify-between bg-surface-900 border border-surface-800 rounded-lg p-1">
        <p-button
          icon="pi pi-chevron-left"
          [text]="true"
          [rounded]="true"
          [disabled]="selectedDateIndex() <= 0"
          (onClick)="prevDay()">
        </p-button>

        <div
          class="flex items-center gap-2 cursor-pointer hover:text-primary-400 transition-colors px-3 py-1 rounded"
          (click)="op.toggle($event)">
          <span class="font-bold text-surface-0 whitespace-nowrap min-w-20 text-center">
            {{ selectedDateLabel() }}
          </span>
          <i class="pi pi-calendar text-sm text-surface-400"></i>
        </div>

        <p-button
          icon="pi pi-chevron-right"
          [text]="true"
          [rounded]="true"
          [disabled]="selectedDateIndex() === -1 || selectedDateIndex() >= availableDates().length - 1"
          (onClick)="nextDay()">
        </p-button>
      </div>

      <p-popover #op [pt]="{ content: { style: 'padding: 0' } }" styleClass="!p-0">
        <p-datepicker
          [inline]="true"
          [ngModel]="selectedDateObj()"
          (ngModelChange)="onDateSelect($event, op)"
          [minDate]="minDate()"
          [maxDate]="maxDate()"
          [disabledDates]="disabledDates()"
          styleClass="border-none">
        </p-datepicker>
      </p-popover>

      <p-select
        [options]="groups()"
        [ngModel]="selectedGroup()"
        (ngModelChange)="selectedGroup.set($event)"
        [placeholder]="'Grupos'"
        class="w-full md:w-48">
      </p-select>
    </div>
  </div>

  @if (loading()) {
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
      @for (i of [1, 2, 3, 4, 5, 6]; track i) {
        <p-skeleton width="100%" height="200px" borderRadius="12px"></p-skeleton>
      }
    </div>
  } @else {
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
      @for (match of filteredMatches(); track match.num) {
        <app-match-card [match]="match"></app-match-card>
      } @empty {
        <div class="col-span-full text-center p-8 text-surface-400">
          Nenhum jogo encontrado para os filtros selecionados.
        </div>
      }
    </div>
  }
</div>
